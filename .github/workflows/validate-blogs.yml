name: validate blog frontmatter

on:
  pull_request:
    paths:
      - 'resources/blogs/**.md'

permissions:
  contents: read

jobs:
  validate:
    name: Validate blog markdown files
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        php-version: ['8.5']
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mrifqyabdallah_test
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U laravel -d mrifqyabdallah_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Get changed blog files
        id: changed-files
        run: |
          # Get only added/modified .md files in resources/blogs/
          FILES=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD \
            | grep '^resources/blogs/.*\.md$' \
            | tr '\n' ',' \
            | sed 's/,$//')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run frontmatter validation
        if: steps.changed-files.outputs.files != ''
        run: |
          php artisan blogs:validate --files="${{ steps.changed-files.outputs.files }}"

      - name: No blog files changed
        if: steps.changed-files.outputs.files == ''
        run: echo "No blog markdown files changed in this PR (this action should not run)"
