; OPcache configuration optimized for production on a low-spec VPS
opcache.enable=1
opcache.enable_cli=0

; Memory — keep low for 2GB VPS
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=16000

; Revalidation — disable in prod for performance (files don't change)
opcache.validate_timestamps=0
opcache.revalidate_freq=0

; Correctness
opcache.save_comments=1
opcache.fast_shutdown=1

; Preload app to handle cold start
opcache.preload=/app/docker/php/preload.php
